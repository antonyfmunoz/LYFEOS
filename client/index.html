<!DOCTYPE html>
<html lang="en" class="dark-theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LYFEOS" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=4" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=4" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Theme initialization script -->
    <script src="/theme-init.js"></script>
    <style>
      html, body { background-color: hsl(0 0% 7%); margin: 0; }
      #root { background-color: hsl(0 0% 7%); }
      #oauth-preloader, #app-preloader {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background-color: hsl(0 0% 7%);
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #oauth-preloader .brand, #app-preloader .brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.875rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 1rem;
      }
      #oauth-preloader .spinner, #app-preloader .spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: 2px solid #fff;
        border-top-color: transparent;
        animation: oauth-spin 0.8s linear infinite;
      }
      #oauth-preloader .subtext, #app-preloader .subtext {
        color: #888;
        font-size: 0.875rem;
        margin-top: 1rem;
        font-family: sans-serif;
      }
      @keyframes oauth-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        var pending = localStorage.getItem('lyfeos-oauth-redirect-pending') || localStorage.getItem('lyfeos-oauth-mode');
        if (pending) {
          document.addEventListener('DOMContentLoaded', function() {
            var el = document.getElementById('oauth-preloader');
            if (el) el.style.display = 'flex';
          });
        } else if (localStorage.getItem('lyfeos_user')) {
          document.addEventListener('DOMContentLoaded', function() {
            var el = document.getElementById('app-preloader');
            if (el) el.style.display = 'flex';
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="oauth-preloader">
      <div class="brand">LYFEOS</div>
      <div class="spinner"></div>
      <div class="subtext">Signing you in...</div>
    </div>
    <div id="app-preloader">
      <div class="brand">LYFE<span style="color:#fff">OS</span></div>
      <div class="spinner"></div>
      <div class="subtext">Loading...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
