<!DOCTYPE html>
<html lang="en" class="dark-theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LYFEOS" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=4" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=4" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Inline theme initialization - runs before any CSS loads -->
    <script>
      (function() {
        var savedTheme = localStorage.getItem('lyfeos-theme');
        if (savedTheme === 'light') {
          document.documentElement.classList.add('light-theme');
          document.documentElement.classList.remove('dark-theme');
        } else {
          document.documentElement.classList.add('dark-theme');
          document.documentElement.classList.remove('light-theme');
        }

        function applyColor(color) {
          if (!color) return;
          var hex = color.replace(/^#/, '');
          var ri = parseInt(hex.substring(0, 2), 16);
          var gi = parseInt(hex.substring(2, 4), 16);
          var bi = parseInt(hex.substring(4, 6), 16);
          var r = ri / 255, g = gi / 255, b = bi / 255;
          var max = Math.max(r, g, b), min = Math.min(r, g, b);
          var l = (max + min) / 2, h, s;
          if (max === min) { h = 0; s = 0; }
          else {
            s = l > 0.5 ? (max - min) / (2 - max - min) : (max - min) / (max + min);
            switch (max) {
              case r: h = (g - b) / (max - min) + (g < b ? 6 : 0); break;
              case g: h = (b - r) / (max - min) + 2; break;
              case b: h = (r - g) / (max - min) + 4; break;
              default: h = 0;
            }
            h /= 6;
          }
          h = Math.round(h * 360);
          s = Math.round(s * 100);
          l = Math.round(l * 100);
          var hsl = h + ' ' + s + '% ' + l + '%';
          var el = document.documentElement;
          el.style.setProperty('--primary', hsl);
          el.style.setProperty('--primary-hsl', hsl);
          el.style.setProperty('--primary-color', color);
          el.style.setProperty('--primary-glow-light', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.3)');
          el.style.setProperty('--primary-glow-medium', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.5)');
          el.style.setProperty('--primary-glow-strong', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.7)');
          el.style.setProperty('--primary-bg-subtle', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.1)');
          el.style.setProperty('--primary-bg-light', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.2)');
          el.style.setProperty('--primary-border-subtle', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.2)');
          el.style.setProperty('--primary-shadow', 'rgba(' + ri + ',' + gi + ',' + bi + ',0.3)');
          el.style.setProperty('--secondary', hsl);
          el.style.setProperty('--accent', hsl);
        }

        function getColor() {
          var path = window.location.pathname.replace(/\/+$/, '') || '/';
          var savedColor = localStorage.getItem('lyfeos-primary-color') || localStorage.getItem('lyfeos-last-primary-color');
          var isNeutralPage = path === '/login' || path === '/register' || path === '/forgot-password' || path === '/reset-password' || path === '/';
          var isOnboarding = path === '/onboarding';
          return isNeutralPage ? '#ffffff' : isOnboarding ? (savedColor || '#ffffff') : savedColor;
        }

        applyColor(getColor());

        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            applyColor(getColor());
          }
        });

        window.addEventListener('pageshow', function(e) {
          if (e.persisted) {
            applyColor(getColor());
          }
        });
      })();
    </script>
    <style>
      :root { --app-height: 100dvh; }
      html { height: 100%; background-color: hsl(0 0% 7%); margin: 0; overscroll-behavior: none; }
      body { min-height: 100%; background-color: hsl(0 0% 7%); margin: 0; overscroll-behavior: none; }
      #root { background-color: hsl(0 0% 7%); min-height: var(--app-height, 100dvh); }
      #oauth-preloader {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background-color: hsl(0 0% 7%);
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #oauth-preloader .brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.875rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 1rem;
      }
      #oauth-preloader .spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: 2px solid #fff;
        border-top-color: transparent;
        animation: oauth-spin 0.8s linear infinite;
      }
      #oauth-preloader .subtext {
        color: #888;
        font-size: 0.875rem;
        margin-top: 1rem;
        font-family: sans-serif;
      }
      @keyframes oauth-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        var pending = localStorage.getItem('lyfeos-oauth-redirect-pending') || localStorage.getItem('lyfeos-oauth-mode');
        if (pending) {
          document.addEventListener('DOMContentLoaded', function() {
            var el = document.getElementById('oauth-preloader');
            if (el) el.style.display = 'flex';
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="oauth-preloader">
      <div class="brand">LYFEOS</div>
      <div class="spinner"></div>
      <div class="subtext">Signing you in...</div>
    </div>
    <div id="root" style="background-color: hsl(0 0% 7%);"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
